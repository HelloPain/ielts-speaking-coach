interface:
  display_name: IELTS Speaking Coach
  short_description: Part 1 teaching with review and Notion progress
  default_prompt: Prepare my Part 1 Teaching session in text mode. Read P1 Progress, my latest Notion archive, and the bundled bank. Combine all due reviews with every unasked question from one new topic. Before Live, display every selected question in a table with its ID, type, topic, and exact bank wording; verify and report an X/X exact-string match. Lock that displayed list and wait for me to enter Live.
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
