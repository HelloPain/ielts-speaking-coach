interface:
  display_name: IELTS Speaking Coach
  short_description: Part 1 new-topic or review teaching
  default_prompt: Prepare my Part 1 Teaching session in text mode. Default to New Topic Mode with only the unasked questions from one new bundled-bank topic; use due review questions only when I explicitly request Review Mode. Read P1 Progress and my latest archive, display every selected question with its ID, type, topic, and exact bank wording, report an X/X exact-string match, lock the list, and wait for me to enter Live.
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
